<!doctype html>
<html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{width:1290px;height:2796px;background:#0a0a12;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;color:#fff}
.status-bar{height:120px;display:flex;justify-content:space-between;align-items:center;padding:0 80px;font-weight:600;font-size:42px;color:#fff}

.container{padding:0 80px;display:flex;flex-direction:column;height:calc(100% - 120px)}

.brand{display:flex;flex-direction:column;align-items:center;gap:40px}

.brand-name{font-size:88px;font-weight:700;color:#fff}
.tagline{text-align:center;font-size:42px;color:rgba(255,255,255,0.55);line-height:1.4;margin-top:8px}
.bottom{padding-bottom:120px}
.apple-btn{height:140px;background:#fff;color:#000;border-radius:38px;display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:600;gap:20px}

.privacy{text-align:center;font-size:36px;color:rgba(255,255,255,0.5);margin-top:32px}

</style>
</head>
<body>
<div class="status-bar">
<span>9:41</span>
<span class="status-icons">●●●● ●●●● 100%</span>
</div>
<div class="headline">Marketing captions in seconds.</div>
<div class="container">
  <div class="spacer"></div>
  <div class="brand">
    <div class="logo">X5</div>
    <div class="brand-name">X5</div>
