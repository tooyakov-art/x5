<!doctype html>
<html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{width:2048px;height:2732px;background:#0a0a12;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;color:#fff}
.status-bar{height:96px;display:flex;justify-content:space-between;align-items:center;padding:0 120px;font-weight:600;font-size:34px}
.nav-bar{display:flex;align-items:center;padding:30px 384px 50px;justify-content:space-between}
.nav-title{font-size:72px;font-weight:700}
.close-btn{font-size:60px;color:rgba(255,255,255,0.7)}
.content{max-width:1280px;margin:0 auto;padding:0 80px}
.headline{text-align:center;font-size:68px;font-weight:700;color:#FFEB3B;line-height:1.15;margin-bottom:80px}
.section{margin-bottom:60px}
.section-label{font-size:36px;font-weight:600;color:rgba(255,255,255,0.55);letter-spacing:3.6px;text-transform:uppercase;margin-bottom:30px;padding-left:14px}
.row{background:rgba(255,255,255,0.05);border-radius:42px;padding:48px;display:flex;align-items:center;margin-bottom:24px}
.row-icon{width:84px;height:84px;border-radius:24px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:42px;margin-right:32px;flex-shrink:0}
.row-text{font-size:42px;color:#fff}
.row-sub{font-size:34px;color:rgba(255,255,255,0.5);margin-top:8px}
.bullets{font-size:40px;color:rgba(255,255,255,0.7);line-height:1.6;margin-bottom:80px}
.bullet{display:flex;align-items:flex-start;gap:24px;margin-bottom:24px}
.bullet::before{content:"✓";color:#7BD3F7;font-size:44px;flex-shrink:0;width:50px}
.danger .section-label{color:#FF6B6B}
.danger-row{background:rgba(255,107,107,0.1);border:2px solid rgba(255,107,107,0.3);border-radius:42px;padding:54px;text-align:center;font-size:44px;font-weight:600;color:#FF6B6B}
</style></head>
<body>
<div class="status-bar"><span>9:41</span><span>●●●● ●●●● 100%</span></div>
<div class="nav-bar"><div class="close-btn">✕</div><div class="nav-title">Profile</div><div style="width:60px"></div></div>
<div class="content">
  <div class="headline">Your data, your control.</div>
  <div class="section">
    <div class="section-label">Account</div>
    <div class="row">
      <div class="row-icon">◐</div>
      <div>
        <div class="row-text">Signed in with Apple</div>
        <div class="row-sub">apple-relay@privaterelay.appleid.com</div>
      </div>
    </div>
  </div>
  <div class="bullets">
    <div class="bullet">No tracking, no analytics, no ads.</div>
    <div class="bullet">Captions generated on-device.</div>
    <div class="bullet">Email never shared with us via Apple Hide My Email.</div>
  </div>
  <div class="section danger">
    <div class="section-label">Danger zone</div>
    <div class="danger-row">Delete Account</div>
  </div>
</div>
</body></html>
