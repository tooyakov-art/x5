<!doctype html>
<html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{width:1290px;height:2796px;background:#0a0a12;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;color:#fff}
.status-bar{height:120px;display:flex;justify-content:space-between;align-items:center;padding:0 80px;font-weight:600;font-size:42px}
.status-icons{display:flex;gap:20px;font-size:38px}
.nav-bar{display:flex;justify-content:space-between;align-items:center;padding:30px 80px 60px}
.nav-title{font-size:80px;font-weight:700;letter-spacing:-2px}
.profile-icon{width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:54px;color:#fff}
.headline{position:absolute;left:80px;right:80px;top:200px;text-align:center;font-size:48px;font-weight:700;color:#FFEB3B}
.section{padding:0 80px;margin-top:60px}
.label{font-size:34px;font-weight:600;color:rgba(255,255,255,0.55);letter-spacing:3.6px;margin-bottom:36px;text-transform:uppercase}
.input{background:rgba(255,255,255,0.06);border-radius:42px;padding:48px 56px;font-size:46px;color:#fff;min-height:200px}
.input span{color:rgba(255,255,255,0.4)}
.tones{display:flex;gap:30px;margin-top:0}
.chip{flex:1;text-align:center;padding:38px 0;border-radius:200px;font-size:42px;font-weight:500;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.85)}
.chip.active{background:rgba(255,235,59,0.18);color:#FFEB3B;border:3px solid #FFEB3B}
.btn-generate{margin-top:60px;background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.5);font-size:50px;font-weight:600;text-align:center;padding:54px 0;border-radius:42px}
.hint{text-align:center;font-size:38px;color:rgba(255,255,255,0.4);margin-top:120px;padding:0 100px;line-height:1.4}
</style>
</head>
<body>
<div class="status-bar"><span>9:41</span><span class="status-icons">●●●● ●●●● 100%</span></div>
<div class="nav-bar"><div class="nav-title">X5</div><div class="profile-icon">◐</div></div>
<div class="headline">Type a topic. Pick a tone. Done.</div>
<div class="section">
  <div class="label">Topic</div>
  <div class="input"><span>e.g. opening a coffee shop</span></div>
</div>
<div class="section">
  <div class="label">Tone</div>
  <div class="tones">
    <div class="chip active">Friendly</div>
    <div class="chip">Pro</div>
    <div class="chip">Funny</div>
  </div>
</div>
<div class="section">
  <div class="btn-generate">Generate</div>
  <div class="hint">Five tailored captions appear instantly. Tap Copy on any one to copy it to clipboard.</div>
</div>
</body></html>
