name: X5
options:
  bundleIdPrefix: com.x5studio
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: F8LA8PC4U6
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "41"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  X5:
    type: application
    platform: iOS
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    sources:
      - path: X5
    resources:
      - path: X5/Assets.xcassets
    info:
      path: X5/Info.plist
      properties:
        CFBundleDisplayName: X5
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - ru
          - kk
        CFBundleURLTypes:
          - CFBundleURLName: com.x5studio.app.oauth
            CFBundleURLSchemes:
              - x5
          # Google Sign-In iOS SDK reversed client ID (matches iOS Client ID in GCP)
          - CFBundleURLName: com.googleusercontent.apps.931639129066-ft7bod2n3ugi4cc3j1l68avcqtq3rv2j
            CFBundleURLSchemes:
              - com.googleusercontent.apps.931639129066-ft7bod2n3ugi4cc3j1l68avcqtq3rv2j
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Используется для блокировки X5 — открыть приложение можно только владельцу устройства."
        NSMicrophoneUsageDescription: "Доступ к микрофону нужен чтобы записывать голосовые сообщения в чатах."
        NSPhotoLibraryUsageDescription: "Доступ к галерее нужен чтобы прикреплять фото в чатах и портфолио."
        LSApplicationCategoryType: public.app-category.productivity
        NSPrivacyTracking: false
        NSPrivacyAccessedAPITypes:
          - NSPrivacyAccessedAPIType: NSPrivacyAccessedAPICategoryUserDefaults
            NSPrivacyAccessedAPITypeReasons: ["CA92.1"]
          - NSPrivacyAccessedAPIType: NSPrivacyAccessedAPICategoryFileTimestamp
            NSPrivacyAccessedAPITypeReasons: ["C617.1"]
          - NSPrivacyAccessedAPIType: NSPrivacyAccessedAPICategorySystemBootTime
            NSPrivacyAccessedAPITypeReasons: ["35F9.1"]
          - NSPrivacyAccessedAPIType: NSPrivacyAccessedAPICategoryDiskSpace
            NSPrivacyAccessedAPITypeReasons: ["E174.1"]
    entitlements:
      path: X5/X5.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: production
    configFiles:
      Release: Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.x5studio.app
        PRODUCT_NAME: X5
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: NO
        ENABLE_BITCODE: NO
        SWIFT_OBJC_BRIDGING_HEADER: ""
      configs:
        # Manual signing scoped to the X5 target for Release only — keeps SPM
        # dependencies (GoogleSignIn / AppAuth / GTMSessionFetcher resource
        # bundles) on Automatic signing where they don't trip on a manual
        # provisioning profile. Profile NAME is injected via Release.xcconfig
        # at CI time (it comes from the secret-encoded mobileprovision).
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
