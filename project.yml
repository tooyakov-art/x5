name: X5
options:
  bundleIdPrefix: com.x5studio
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: F8LA8PC4U6
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "15"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  X5:
    type: application
    platform: iOS
    sources:
      - path: X5
    resources:
      - path: X5/Assets.xcassets
    info:
      path: X5/Info.plist
      properties:
        CFBundleDisplayName: X5
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: en
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.productivity
        NSPrivacyTracking: false
        NSPrivacyAccessedAPITypes:
          - NSPrivacyAccessedAPIType: NSPrivacyAccessedAPICategoryUserDefaults
            NSPrivacyAccessedAPITypeReasons: ["CA92.1"]
          - NSPrivacyAccessedAPIType: NSPrivacyAccessedAPICategoryFileTimestamp
            NSPrivacyAccessedAPITypeReasons: ["C617.1"]
          - NSPrivacyAccessedAPIType: NSPrivacyAccessedAPICategorySystemBootTime
            NSPrivacyAccessedAPITypeReasons: ["35F9.1"]
          - NSPrivacyAccessedAPIType: NSPrivacyAccessedAPICategoryDiskSpace
            NSPrivacyAccessedAPITypeReasons: ["E174.1"]
    entitlements:
      path: X5/X5.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.x5studio.app
        PRODUCT_NAME: X5
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: NO
        ENABLE_BITCODE: NO
        SWIFT_OBJC_BRIDGING_HEADER: ""
