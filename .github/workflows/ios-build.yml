name: iOS build & TestFlight upload

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40
    env:
      SCHEME: X5
      BUNDLE_ID: com.x5studio.app
      ARCHIVE_PATH: ${{ github.workspace }}/build/X5.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: List & install iOS simulator runtime if missing
        run: |
          xcodebuild -showsdks
          xcrun simctl list runtimes
          # Pre-install iOS runtime needed by actool when archiving on Xcode 16.
          sudo xcodebuild -downloadPlatform iOS || true
          xcrun simctl list runtimes

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set up signing keychain
        env:
          P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo -n "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo -n "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          # Strip any CR/LF from password that might've crept into the secret value.
          P12_PASSWORD_CLEAN=$(printf '%s' "$P12_PASSWORD" | tr -d '\r\n')

          echo "p12 size: $(wc -c < "$CERT_PATH")"
          echo "profile size: $(wc -c < "$PROFILE_PATH")"
          echo "p12 pass length: ${#P12_PASSWORD_CLEAN}"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD_CLEAN" -f pkcs12 -A -t cert
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<<"$(security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "Installed profile UUID: $UUID"

      - name: Resolve provisioning profile name
        id: profile
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<<"$(security cms -D -i "$PROFILE_PATH")")
          echo "Using profile: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Patch ExportOptions.plist with profile name
        run: |
          /usr/libexec/PlistBuddy -c "Set :provisioningProfiles:${BUNDLE_ID} '${{ steps.profile.outputs.name }}'" ExportOptions.plist

      - name: Build & archive
        run: |
          set -euo pipefail
          xcodebuild \
            -project X5.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.profile.outputs.name }}" \
            DEVELOPMENT_TEAM=F8LA8PC4U6 \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/build.keychain-db" \
            ENABLE_ON_DEMAND_RESOURCES=NO \
            ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS=NO \
            archive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: X5-ipa
          path: ${{ env.EXPORT_PATH }}/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          P8_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
          printf '%s' "$ASC_API_KEY_BASE64" | base64 --decode > "$P8_PATH"
          echo "p8 size: $(wc -c < "$P8_PATH")"
          # Also place where altool searches per Apple docs
          mkdir -p ./private_keys
          cp "$P8_PATH" ./private_keys/

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          IPA=$(ls "$EXPORT_PATH"/*.ipa | head -n 1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID"
